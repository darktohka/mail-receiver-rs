name: Build container

on:
  push:
  workflow_dispatch:
  repository_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: x86_64
            target: x86_64-unknown-linux-gnu
          - platform: aarch64
            target: aarch64-unknown-linux-gnu
          - platform: armv7
            target: armv7-unknown-linux-gnueabihf
    name: Build for ${{ matrix.platform }}
    runs-on: ubuntu-latest
    steps:
      - name: Install Cross
        run: |
          curl -SsL https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall cross
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Build the binary
        working-directory: backend
        run: RUSTFLAGS="-C target-feature=+crt-static" ~/.cargo/bin/cross build --profile release-lto --target ${{ matrix.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: binary-${{ matrix.platform }}
          path: backend/target/${{ matrix.target }}/release-lto/mail-receiver-rs

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: frontend-dist
          path: frontend/dist

  push:
    name: Push image
    runs-on: ubuntu-latest
    needs: [build, build-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Download binary artifacts
        uses: actions/download-artifact@v6
        with:
          path: backend
      - name: Download frontend dist
        uses: actions/download-artifact@v6
        with:
          name: frontend-dist
          path: frontend-dist
      - name: Set executable permissions
        working-directory: backend
        run: |
          chmod +x */mail-receiver-rs
      - name: Copy frontend dist into binary directories
        working-directory: backend
        run: |
          for dir in binary-*/; do
            cp -r "$GITHUB_WORKSPACE/frontend-dist" "${dir}dist"
          done
      - name: Push the image
        working-directory: backend
        run: |
          docker run -v $(pwd):/srv darktohka/ocitool upload --username "${{ secrets.DOCKER_USERNAME }}" --password "${{ secrets.DOCKER_PASSWORD }}"
